<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Compass — Design Explorations</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Mona+Sans:wght@400;500;600;700&family=Hubot+Sans:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Inter Tight', system-ui, sans-serif; background: #e2e8f0; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="tokens.js"></script>
<script type="text/babel" src="atoms.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" src="marketing-safe.jsx"></script>
<script type="text/babel" src="marketing-balanced.jsx"></script>
<script type="text/babel" src="marketing-bold.jsx"></script>
<script type="text/babel" src="troop-pages.jsx"></script>
<script type="text/babel" src="admin-pages.jsx"></script>
<script type="text/babel" src="security.jsx"></script>
<script type="text/babel" src="font-comparison.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="mobile-app.jsx"></script>
<script type="text/babel" src="mobile-chat.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "marketingPalette": "bold",
  "troopPalette": "bold",
  "adminPalette": "bold"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const P = window.SH_PALETTES;

  return (
    <>
      <DesignCanvas>
        <DCSection
          id="marketing"
          title="Marketing site"
          subtitle="compass.app — the page that sells the platform to volunteer troop leaders. Forest & ember palette, pushed bolder: massive serif type, ember used as solid color blocks (not just italic accents), dark-forest stats and testimonial bands, color-coded features."
        >
          <DCArtboard id="m-balanced" label="Marketing · Forest & Ember (bolder)" width={1200} height={2400}>
            <MarketingBalanced palette={P.balanced}/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="troop"
          title="Public troop page"
          subtitle="What families and visitors land on. Mocked with Troop 12 Anytown. Dark-forest hero with massive 567 watermark, color-coded events and news, ember as the calling-card color."
        >
          <DCArtboard id="t-balanced" label="Troop page · Forest & Ember (bolder)" width={1200} height={1800}>
            <TroopBalanced palette={P.balanced}/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="admin"
          title="Admin dashboard"
          subtitle="The committee chair / scoutmaster's home base. Dark-forest title block, color-coded stat cards and events, color-coded activity feed."
        >
          <DCArtboard id="a-balanced" label="Admin · Forest & Ember (bolder)" width={1400} height={900}>
            <AdminBalanced palette={P.balanced}/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="security"
          title="Security & trust"
          subtitle="Volunteer leaders are stewards of minors' data — names, ages, medical info, photos. This page addresses the question every committee chair should ask: how is this protected?"
        >
          <DCArtboard id="sec-balanced" label="Security · Forest & Ember" width={1200} height={1800}>
            <SecurityCard palette={P.balanced}/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="mobile"
          title="Parent mobile app"
          subtitle="Eight screens of the Compass parent companion. Home, calendar, event RSVP, payment, messages list, two-deep thread, photos grid, photo permissions. Slate & sky palette with the warm amber accent. iOS 26 device frames."
        >
          <DCArtboard id="mob-home" label="01 Home" width={402} height={874}>
            <MobileHome/>
          </DCArtboard>
          <DCArtboard id="mob-cal" label="02 Calendar" width={402} height={874}>
            <MobileCalendar/>
          </DCArtboard>
          <DCArtboard id="mob-event" label="03 Event detail · RSVP" width={402} height={874}>
            <MobileEvent/>
          </DCArtboard>
          <DCArtboard id="mob-pay" label="04 Payment" width={402} height={874}>
            <MobilePayment/>
          </DCArtboard>
          <DCArtboard id="mob-msg" label="05 Messages" width={402} height={874}>
            <MobileMessages/>
          </DCArtboard>
          <DCArtboard id="mob-thread" label="06 Thread · two-deep" width={402} height={874}>
            <MobileThread/>
          </DCArtboard>
          <DCArtboard id="mob-photos" label="07 Photos" width={402} height={874}>
            <MobilePhotos/>
          </DCArtboard>
          <DCArtboard id="mob-perms" label="08 Photo permissions" width={402} height={874}>
            <MobilePhotoPerms/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="chat"
          title="Team chat"
          subtitle="SportsEngine-style group chat for dens, patrols, packs, troops. Auto-created channels per den/patrol with two-deep leader inclusion. Event channels auto-archive when the event ends. Polls, RSVPs, and pinned posts native to the thread. Leader-only oversight view shows what stays YPT-compliant by design."
        >
          <DCArtboard id="chat-channels" label="01 Channels list" width={402} height={874}>
            <ChatChannels/>
          </DCArtboard>
          <DCArtboard id="chat-patrol" label="02 Patrol thread · two-deep" width={402} height={874}>
            <ChatPatrol/>
          </DCArtboard>
          <DCArtboard id="chat-event" label="03 Event channel + RSVP" width={402} height={874}>
            <ChatEventRSVP/>
          </DCArtboard>
          <DCArtboard id="chat-poll" label="04 Poll" width={402} height={874}>
            <ChatPoll/>
          </DCArtboard>
          <DCArtboard id="chat-leader" label="05 Leader oversight" width={402} height={874}>
            <ChatLeaderView/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="fonts"
          title="Type direction"
          subtitle="The selected pair, shown applied to the same Compass content used everywhere on this canvas."
        >
          <DCArtboard id="fonts-all" label="Newsreader + Inter Tight · selected" width={860} height={900}>
            <FontComparison palette={P.balanced}/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Notes">
          <div style={{ fontSize: 12, lineHeight: 1.5, color: 'rgba(0,0,0,0.65)' }}>
            Forest & Ember direction, dialed bolder. The other two directions (Pine & Brass, Evergreen & Chartreuse) were dropped — ask if you want them back for comparison.
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

// Small palette comparison card
function PaletteCard() {
  const T = window.SH_TYPE;
  const P = window.SH_PALETTES;
  return (
    <div style={{ width: 1200, height: 420, background: '#fafaf7', padding: 32, fontFamily: T.ui, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
      {['safe', 'balanced', 'bold'].map((k, i) => {
        const p = P[k];
        return (
          <div key={k} style={{ background: p.bg, border: `1px solid ${p.line}`, borderRadius: 12, padding: 24, color: p.ink, position: 'relative', overflow: 'hidden' }}>
            <div style={{ fontSize: 11, color: p.inkMuted, letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 600 }}>{k}</div>
            <div style={{ fontFamily: T.display, fontSize: 32, fontWeight: 400, lineHeight: 1.05, margin: '8px 0 6px', letterSpacing: '-0.02em' }}>{p.name}</div>
            <div style={{ fontFamily: T.display, fontSize: 14, fontStyle: 'italic', color: p.inkSoft, marginBottom: 20 }}>
              {k === 'safe' && 'Refined heritage. Familiar but elevated.'}
              {k === 'balanced' && 'Distinctive, warm, editorial energy.'}
              {k === 'bold' && 'Modern, confident, design-led.'}
            </div>
            <div style={{ display: 'flex', gap: 6, marginBottom: 16 }}>
              {[p.primary, p.accent, p.ink, p.surfaceAlt, p.bg].map((c, j) => (
                <div key={j} style={{ flex: 1, height: 36, background: c, borderRadius: 4, border: `1px solid ${p.line}` }}/>
              ))}
            </div>
            <button style={{ background: p.primary, color: '#fff', border: 'none', padding: '8px 14px', borderRadius: 6, fontSize: 12, fontWeight: 500, marginRight: 6 }}>Primary</button>
            <button style={{ background: p.accent, color: k === 'bold' ? p.ink : '#fff', border: 'none', padding: '8px 14px', borderRadius: 6, fontSize: 12, fontWeight: 600 }}>Accent</button>
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
