# Compass production nginx config.
#
# Terminates TLS for the apex (compass.app) and any org subdomain
# (*.compass.app), proxies to the Express app on :8080, and forwards
# the org subdomain through the Host header so the app's tenant
# resolver picks up req.org from req.hostname.
#
# Cert pair lives at /etc/nginx/certs/{fullchain,privkey}.pem — wildcard
# cert from Let's Encrypt or a cloud-managed equivalent.

worker_processes  auto;
events { worker_connections  1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Ship a Real-IP header through to the app so structured logs can
  # carry the client's ip without us having to reverse-engineer it.
  set_real_ip_from 0.0.0.0/0;
  real_ip_header X-Forwarded-For;

  # Standard combined log format + a JSON variant for log aggregators.
  log_format json escape=json '{"ts":"$time_iso8601","ip":"$remote_addr","host":"$host","method":"$request_method","path":"$request_uri","status":$status,"ms":$request_time,"ua":"$http_user_agent"}';
  access_log /var/log/nginx/access.log json;

  # HTTP -> HTTPS redirect for everything (apex + subdomains).
  server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ACME challenge passthrough so Let's Encrypt renewals work without
  # bringing the proxy down. Adjust path if your renewer uses a
  # different webroot.
  server {
    listen 80;
    server_name compass.app *.compass.app;
    location /.well-known/acme-challenge/ {
      root /var/www/letsencrypt;
    }
    location / { return 301 https://$host$request_uri; }
  }

  upstream compass {
    server app:8080;
    keepalive 32;
  }

  server {
    listen 443 ssl http2;
    server_name compass.app *.compass.app;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # 50MB upload ceiling matches the photo-upload limit in the app.
    # If you raise app-side, raise here too.
    client_max_body_size 50m;

    # The app emits its own security headers; we just don't override
    # them. Add HSTS at the proxy so it survives any code change.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location / {
      proxy_pass http://compass;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;

      # SSE for /chat/stream needs long timeouts and no buffering.
      proxy_read_timeout 1h;
      proxy_buffering off;
      proxy_cache off;
    }
  }
}
