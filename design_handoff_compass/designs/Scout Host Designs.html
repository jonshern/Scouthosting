<script type="text/babel" data-presets="react">
const { useState } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "marketingPalette": "bold",
  "troopPalette": "bold",
  "adminPalette": "bold"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const P = window.SH_PALETTES;

  return (
    <>
      <DesignCanvas>
        <DCSection
          id="marketing"
          title="Marketing site"
          subtitle="compass.app — the page that sells the platform to volunteer troop leaders. Forest & ember palette, pushed bolder: massive serif type, ember used as solid color blocks (not just italic accents), dark-forest stats and testimonial bands, color-coded features."
        >
          <DCArtboard id="m-balanced" label="Marketing · Forest & Ember (bolder)" width={1200} height={2400}>
            <MarketingBalanced palette={P.balanced}/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="troop"
          title="Public troop page"
          subtitle="What families and visitors land on. Mocked with Troop 12 Anytown. Dark-forest hero with massive 567 watermark, color-coded events and news, ember as the calling-card color."
        >
          <DCArtboard id="t-balanced" label="Troop page · Forest & Ember (bolder)" width={1200} height={1800}>
            <TroopBalanced palette={P.balanced}/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="admin"
          title="Admin dashboard"
          subtitle="The committee chair / scoutmaster's home base. Dark-forest title block, color-coded stat cards and events, color-coded activity feed."
        >
          <DCArtboard id="a-balanced" label="Admin · Forest & Ember (bolder)" width={1400} height={900}>
            <AdminBalanced palette={P.balanced}/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="security"
          title="Security & trust"
          subtitle="Volunteer leaders are stewards of minors' data — names, ages, medical info, photos. This page addresses the question every committee chair should ask: how is this protected?"
        >
          <DCArtboard id="sec-balanced" label="Security · Forest & Ember" width={1200} height={1800}>
            <SecurityCard palette={P.balanced}/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="mobile"
          title="Parent mobile app"
          subtitle="Twelve screens of the Compass parent companion. New: Facebook-style Feed replaces Home (mixed post types, moderated comments, leader composer); Calendar gets Outlook-style month / 3-month / agenda views; Event detail picks up a weather forecast strip as soon as we're inside the 10-day window. Slate & sky palette with the warm amber accent. iOS 26 device frames."
        >
          <DCArtboard id="mob-feed" label="01 Feed (home)" width={402} height={874}>
            <MobileFeed/>
          </DCArtboard>
          <DCArtboard id="mob-feed-detail" label="02 Post detail · comments" width={402} height={874}>
            <MobileFeedDetail/>
          </DCArtboard>
          <DCArtboard id="mob-feed-compose" label="03 Leader composer" width={402} height={874}>
            <MobileFeedCompose/>
          </DCArtboard>
          <DCArtboard id="mob-cal-month" label="04 Calendar · month" width={402} height={874}>
            <MobileCalendarMonth/>
          </DCArtboard>
          <DCArtboard id="mob-cal-3mo" label="05 Calendar · 3-month" width={402} height={874}>
            <MobileCalendar3Mo/>
          </DCArtboard>
          <DCArtboard id="mob-cal-list" label="06 Calendar · agenda list" width={402} height={874}>
            <MobileCalendar/>
          </DCArtboard>
          <DCArtboard id="mob-event" label="07 Event detail · RSVP + weather" width={402} height={874}>
            <MobileEvent/>
          </DCArtboard>
          <DCArtboard id="mob-pay" label="08 Payment" width={402} height={874}>
            <MobilePayment/>
          </DCArtboard>
          <DCArtboard id="mob-msg" label="09 Messages" width={402} height={874}>
            <MobileMessages/>
          </DCArtboard>
          <DCArtboard id="mob-thread" label="10 Thread · two-deep" width={402} height={874}>
            <MobileThread/>
          </DCArtboard>
          <DCArtboard id="mob-photos" label="11 Photos" width={402} height={874}>
            <MobilePhotos/>
          </DCArtboard>
          <DCArtboard id="mob-perms" label="12 Photo permissions" width={402} height={874}>
            <MobilePhotoPerms/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="chat"
          title="Team chat"
          subtitle="SportsEngine-style group chat for dens, patrols, packs, troops. Auto-created channels per den/patrol with two-deep leader inclusion. Event channels auto-archive when the event ends. Polls, RSVPs, and pinned posts native to the thread. Leader-only oversight view shows what stays YPT-compliant by design."
        >
          <DCArtboard id="chat-channels" label="01 Channels list" width={402} height={874}>
            <ChatChannels/>
          </DCArtboard>
          <DCArtboard id="chat-patrol" label="02 Patrol thread · two-deep" width={402} height={874}>
            <ChatPatrol/>
          </DCArtboard>
          <DCArtboard id="chat-event" label="03 Event channel + RSVP" width={402} height={874}>
            <ChatEventRSVP/>

          title="Email — designed announcement"
          subtitle="The actual May email from Troop 567 (camporee + flag placement) redesigned in Compass. Structured event blocks with one-tap RSVP, no Bcc dump of 70 family addresses, mobile-first body. Plus the leader's composer view with send checks and predicted open rate.">
          <DCArtboard id="email-gmail" label="In Gmail (desktop)" width={1200} height={1700}>

          </DCArtboard>
          <DCArtboard id="email-mobile" label="In iOS Mail" width={402} height={874}>

          <DCArtboard id="cal-month" label="Month view · with detail rail" width={1440} height={900}>
            <DesktopCalendarMonth/>
          </DCArtboard>
          <DCArtboard id="cal-week" label="Week view · timeline" width={1440} height={900}>
            <DesktopCalendarWeek/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="builder-v2"
          title="Page builder v2 — designed FOR volunteer parents"
          subtitle="The TroopWebHost / Troop 8888 problem: give a volunteer a blank canvas and a color picker, you get chaotic typography, polaroids on busy backgrounds, three uneven columns. Compass v2 inverts that: 8 curated themes (a vibe, not a hex code), 42 specific blocks (not 'hero / text / image'), AI assist that uses real troop data, smart layouts. Result: a finished page in 22 minutes that doesn't look homemade."
        >

            <PageBuilderThemes/>
          </DCArtboard>
          <DCArtboard id="pbv2-blocks" label="02 Block library — 42 specific blocks, half pull live data" width={1440} height={900}>
            <PageBuilderBlocks/>
          </DCArtboard>
          <DCArtboard id="pbv2-ai" label="03 AI assist (premium tier) — 'build me a section'" width={1440} height={900}>
            <PageBuilderAI/>
          </DCArtboard>
          <DCArtboard id="pbv2-result" label="04 The finished page (Heritage Patch theme)" width={1200} height={2400}>
            <PageBuilderResult/>
          </DCArtboard>

        <DCSection

            <FrontPageBuilderTemplates/>

        <DCSection
          id="plans"
          title="Plans — economics & open questions"
          subtitle="What does $99 a year buy? Working draft. The base plan is settled ($99/yr · 15 GB photos · BYO custom domain at no markup · 60-day money-back). The AI tier is still an open question — we don't yet know per-troop API cost, which features cut, or willingness-to-pay. This page makes the open questions visible instead of guessing."
        >
          <DCArtboard id="plans-positioning" label="00 Positioning · No commodity markups" width={1440} height={1900}>
            <NoMarkupsPage/>
          </DCArtboard>
          <DCArtboard id="plans-page" label="01 Public plans page (with open questions)" width={1440} height={1700}>
            <PlansPage/>
          </DCArtboard>
          <DCArtboard id="plans-storage" label="02 Storage dashboard (admin)" width={1440} height={900}>
            <StorageDashboard/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="feedback"
          title="In-app feedback & roadmap — customers shape what ships"
          subtitle="A public roadmap board built into the admin app. Customers can vote on requests, watch status updates, and submit their own — with troop context auto-attached. Status pills (Submitted / Triaged / Building / Shipped), real status notes from engineering, and a separate flow for private support tickets."
        >
          <DCArtboard id="fb-board" label="01 Public roadmap board" width={1440} height={1100}>
            <FeedbackBoard/>
          </DCArtboard>
          <DCArtboard id="fb-compose" label="02 New request composer" width={1440} height={900}>
            <FeedbackCompose/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="newsletter"
          title="Auto-newsletter — the 5-minute Sunday email"
          subtitle="Compass drafts the weekly digest from real troop data — calendar, RSVPs, photos, scoutbook achievements. The leader spends 5 minutes reviewing on Sunday morning, hits send. Goes out automatically every week. Plus rule-based reminders that fire on their own (RSVP nudges, dues, post-campout recaps), and a recipient-side preview of what families actually see in their phone Inbox."
        >
          <DCArtboard id="nl-schedule" label="01 Schedule overview" width={1440} height={900}>
            <NewsletterSchedule/>
          </DCArtboard>
          <DCArtboard id="nl-draft" label="02 Draft review (the magic)" width={1440} height={900}>
            <NewsletterDraftReview/>
          </DCArtboard>
          <DCArtboard id="nl-rules" label="03 Reminders & rules" width={1440} height={900}>
            <NewsletterReminders/>
          </DCArtboard>
          <DCArtboard id="nl-inbox" label="04 What families see (iOS Mail)" width={402} height={874}>
            <NewsletterRecipientView/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="fonts"
          title="Type direction"
          subtitle="The selected pair, shown applied to the same Compass content used everywhere on this canvas."
        >
          <DCArtboard id="fonts-all" label="Newsreader + Inter Tight · selected" width={860} height={900}>
            <FontComparison palette={P.balanced}/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Notes">
          <div style={{ fontSize: 12, lineHeight: 1.5, color: 'rgba(0,0,0,0.65)' }}>
            Forest & Ember direction, dialed bolder. The other two directions (Pine & Brass, Evergreen & Chartreuse) were dropped — ask if you want them back for comparison.
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

// Small palette comparison card
function PaletteCard() {
  const T = window.SH_TYPE;
  const P = window.SH_PALETTES;
  return (
    <div style={{ width: 1200, height: 420, background: '#fafaf7', padding: 32, fontFamily: T.ui, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
      {['safe', 'balanced', 'bold'].map((k, i) => {
        const p = P[k];
        return (
          <div key={k} style={{ background: p.bg, border: `1px solid ${p.line}`, borderRadius: 12, padding: 24, color: p.ink, position: 'relative', overflow: 'hidden' }}>
            <div style={{ fontSize: 11, color: p.inkMuted, letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 600 }}>{k}</div>
            <div style={{ fontFamily: T.display, fontSize: 32, fontWeight: 400, lineHeight: 1.05, margin: '8px 0 6px', letterSpacing: '-0.02em' }}>{p.name}</div>
            <div style={{ fontFamily: T.display, fontSize: 14, fontStyle: 'italic', color: p.inkSoft, marginBottom: 20 }}>
              {k === 'safe' && 'Refined heritage. Familiar but elevated.'}
              {k === 'balanced' && 'Distinctive, warm, editorial energy.'}
              {k === 'bold' && 'Modern, confident, design-led.'}
            </div>
            <div style={{ display: 'flex', gap: 6, marginBottom: 16 }}>
              {[p.primary, p.accent, p.ink, p.surfaceAlt, p.bg].map((c, j) => (
                <div key={j} style={{ flex: 1, height: 36, background: c, borderRadius: 4, border: `1px solid ${p.line}` }}/>
              ))}
            </div>
            <button style={{ background: p.primary, color: '#fff', border: 'none', padding: '8px 14px', borderRadius: 6, fontSize: 12, fontWeight: 500, marginRight: 6 }}>Primary</button>
            <button style={{ background: p.accent, color: k === 'bold' ? p.ink : '#fff', border: 'none', padding: '8px 14px', borderRadius: 6, fontSize: 12, fontWeight: 600 }}>Accent</button>
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
