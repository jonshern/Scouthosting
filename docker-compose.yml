services:
  postgres:
    image: postgres:16-alpine
    container_name: compass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: compass
      POSTGRES_PASSWORD: compass
      POSTGRES_DB: compass
    ports:
      - "5432:5432"
    volumes:
      - compass-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compass -d compass"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  compass-pgdata:
