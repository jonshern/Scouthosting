services:
  postgres:
    image: postgres:16-alpine
    container_name: scouthosting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scouthosting
      POSTGRES_PASSWORD: scouthosting
      POSTGRES_DB: scouthosting
    ports:
      - "5432:5432"
    volumes:
      - scouthosting-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scouthosting -d scouthosting"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  scouthosting-pgdata:
