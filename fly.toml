# fly.toml app configuration file generated for compass-staging on 2026-05-02T12:42:08-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'compass-staging'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  APEX_DOMAIN = 'scoutingcompass.com'
  NODE_ENV = 'production'
  PORT = '8080'
  PUSH_DRIVER = 'console'
  # Persist uploads across deploys/restarts. The mount below provides
  # a real disk at /data; lib/storage.js writes to UPLOAD_ROOT.
  UPLOAD_ROOT = '/data/uploads'

# Persistent volume for user uploads (album photos, post photos, form
# attachments, reimbursement receipts, org logos). Without this, every
# `fly deploy` and every machine restart wipes /app/var/uploads/* and
# the live demo 404s on every photo until someone re-seeds.
# Volume created via: fly volumes create compass_uploads --region ord --size 1
# Note: volumes are tied to a single machine. Scaling past 1 machine
# requires either per-machine volumes or moving to object storage (Tigris/S3).
[[mounts]]
  source = 'compass_uploads'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
