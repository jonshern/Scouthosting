# fly.toml app configuration file generated for compass-staging on 2026-05-02T12:42:08-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'compass-staging'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[env]
  APEX_DOMAIN = 'compass-staging.fly.dev'
  NODE_ENV = 'production'
  PORT = '8080'
  PUSH_DRIVER = 'console'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
